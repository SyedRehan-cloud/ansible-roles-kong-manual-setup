plugin: amazon.aws.aws_ec2

regions:
  - us-east-2

filters:
  instance-state-name: running
  tag:Environment: Prod

keyed_groups:
  - key: tags.Role
    prefix: role

hostnames:
  - private-ip-address

compose:
  ansible_host: private_ip_address
  ansible_user: ubuntu
  ansible_ssh_private_key_file: ~/.ssh/kong-key.pem
  ansible_ssh_common_args: "-o ProxyJump=ubuntu@3.135.65.89"
